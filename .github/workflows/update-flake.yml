name: Update Flake Inputs

on:
  schedule:
    # Every Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch: {}

# Prevent concurrent runs stacking up
concurrency:
  group: flake-update
  cancel-in-progress: true

permissions: {}

jobs:
  update:
    name: Update flake.lock and open PR
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        # actions/checkout@v4 (34e114876b0b11c390a56381ad16ebd13914f8d5)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Nix
        # DeterminateSystems/nix-installer-action@v14 (da36cb69b1c3247ad7a1f931ebfd954a1105ef14)
        uses: DeterminateSystems/nix-installer-action@da36cb69b1c3247ad7a1f931ebfd954a1105ef14

      - name: Update flake inputs
        run: nix flake update

      - name: Validate ubuntu profile (dry-run)
        run: |
          nix build .#homeConfigurations.ubuntu.activationPackage \
            --dry-run \
            --no-link \
            2>&1 | tail -20

      - name: Open Pull Request
        # peter-evans/create-pull-request@v7 (22a9089034f40e5a961c8808d113e2c98fb63676)
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: flake-update/${{ github.run_id }}
          delete-branch: true
          commit-message: "chore: update flake inputs"
          title: "chore: update flake inputs (${{ github.run_id }})"
          body: |
            Automated weekly update of `flake.lock` to pull in the latest Nix package versions.

            **After merging**, users can apply the updated packages locally:
            ```sh
            git pull
            just upgrade   # runs: just update && just switch
            # or, for a fresh install:
            just install
            ```
          labels: dependencies
          add-paths: flake.lock
